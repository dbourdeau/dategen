[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = ["if [ -f backend/requirements.txt ]; then cd backend; fi; pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "if [ -f backend/main.py ]; then cd backend; fi; uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
