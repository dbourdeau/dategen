[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv", "nodejs_20", "gcc", "postgresql"]

[phases.install]
cmds = ["if [ -f backend/requirements.txt ]; then BACKEND_DIR=backend; else BACKEND_DIR=.; fi; virtualenv /opt/venv && /opt/venv/bin/pip install --no-cache-dir -r $BACKEND_DIR/requirements.txt && if [ -d frontend ]; then cd frontend && npm install && npm run build && cd .. && rm -rf $BACKEND_DIR/static && mkdir -p $BACKEND_DIR/static && cp -r frontend/dist/. $BACKEND_DIR/static/; fi"]

[start]
cmd = "if [ -f backend/main.py ]; then cd backend; fi; /opt/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
